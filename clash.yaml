# ==================================================
# 策略组（毕业级结构）
# ==================================================
proxy-groups:

- name: 🚀 节点选择
  type: select
  proxies:
    - ⚡ 自动优选
    - Seoul
    - Singapore
    - LA
    - DIRECT

- name: ⚡ 自动优选
  type: url-test
  url: http://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 100
  proxies:
    - Seoul
    - Singapore
    - LA

- name: 🤖 AI
  type: select
  proxies:
    - ⚡ 自动优选
    - Singapore
    - Seoul
    - LA

- name: 🎬 YouTube
  type: select
  proxies:
    - ⚡ 自动优选
    - LA
    - Singapore
    - Seoul

- name: 🌍 国外网站
  type: select
  proxies:
    - ⚡ 自动优选
    - Seoul
    - Singapore
    - LA

# ==================================================
# 规则（简洁高效）
# ==================================================
rules:

# AI
- DOMAIN-SUFFIX,openai.com,🤖 AI
- DOMAIN-SUFFIX,chatgpt.com,🤖 AI
- DOMAIN-SUFFIX,claude.ai,🤖 AI
- DOMAIN-SUFFIX,anthropic.com,🤖 AI
- DOMAIN-SUFFIX,oaistatic.com,🤖 AI

# YouTube
- DOMAIN-SUFFIX,youtube.com,🎬 YouTube
- DOMAIN-SUFFIX,googlevideo.com,🎬 YouTube
- DOMAIN-SUFFIX,ytimg.com,🎬 YouTube

# Google
- DOMAIN-SUFFIX,google.com,🌍 国外网站
- DOMAIN-SUFFIX,gstatic.com,🌍 国外网站
- DOMAIN-SUFFIX,googleapis.com,🌍 国外网站

# Telegram / X
- DOMAIN-SUFFIX,telegram.org,🌍 国外网站
- DOMAIN-SUFFIX,t.me,🌍 国外网站
- DOMAIN-SUFFIX,x.com,🌍 国外网站

# Steam
- DOMAIN-SUFFIX,steampowered.com,🌍 国外网站
- DOMAIN-SUFFIX,steamstatic.com,🌍 国外网站

# 国内直连
- GEOIP,CN,DIRECT

# 兜底
- MATCH,🚀 节点选择
