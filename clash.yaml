# ==================================================
# 基础
# ==================================================
mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090
# ==================================================
# TUN
# ==================================================
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
# ==================================================
# DNS（生产级 FakeIP）
# ==================================================
dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - 1.1.1.1
    - 8.8.8.8
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.googlevideo.com'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
# ==================================================
# 节点（Reality）- 保持原始配置不变
# ==================================================
proxies:
- name: Seoul
  type: vless
  server: 158.247.222.33
  port: 25152
  uuid: c4908ca5-0dd2-4122-8afa-2d98b83d8438
  network: tcp
  tls: true
  udp: true
  flow: xtls-rprx-vision
  servername: www.oracle.com
  reality-opts:
    public-key: hE7Rge1lccNODzn_3JGoUtAin6tFOJlxg-R2ICrUGGw
    short-id: 6ba85179e30d4fc2
  client-fingerprint: chrome
# ==================================================
# 策略组（单节点优化版）
# ==================================================
proxy-groups:
- name: 🚀 节点选择
  type: select
  proxies:
    - Seoul
    - DIRECT
- name: 🤖 AI 专用
  type: select
  proxies:
    - Seoul
- name: 🎬 视频媒体
  type: select
  proxies:
    - Seoul
    - DIRECT
- name: 🎵 Spotify
  type: select
  proxies:
    - Seoul
    - DIRECT
- name: 🌍 国外网站
  type: select
  proxies:
    - Seoul
    - DIRECT
- name: 📥 下载服务
  type: select
  proxies:
    - DIRECT
    - Seoul
