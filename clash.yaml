# ==========================================================
# 基础设置 & TUN 模式优化
# ==========================================================
mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090

# TUN 模式配置：接管整机流量且不影响国内网速
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hierarchical: true

# DNS 优化：国内用阿里/腾讯，国外代理接管
dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - 8.8.8.8
    - 1.1.1.1
  fake-ip-filter:
    - '*.lan'
    - '+.speedtest.net'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'

