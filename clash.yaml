# ==================================================
# 基础配置
# ==================================================
mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090
secret: ""
# ==================================================
# TUN 模式（日常主力推荐）
# ==================================================
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
  strict-route: false
# ==================================================
# DNS 优化（防泄漏 + 国内加速）
# ==================================================
dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  listen: 0.0.0.0:1053
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 114.114.114.114
  fallback:
    - 1.1.1.1
    - 8.8.8.8
    - 9.9.9.9
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.googlevideo.com'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    - '+.stun.*.*'
    - '+.stun.*.*.*'
    - '+.stun.*.*.*.*'
    - '+.stun.*.*.*.*.*'
    - 'time.*.com'
    - 'time.*.gov'
    - 'time.*.edu.cn'
    - 'ntp.*.com'
    - 'ntp.*.gov'
    - 'ntp.*.edu.cn'
# ==================================================
# 节点配置（单节点优化）
# ==================================================
proxies:
- name: Seoul
  type: vless
  server: 158.247.222.33
  port: 25152
  uuid: bd64aee4-29db-483b-9309-08de45f228f8
  network: tcp
  tls: true
  udp: true
  flow: xtls-rprx-vision
  servername: www.oracle.com
  reality-opts:
    public-key: hE7Rge1lccNODzn_3JGoUtAin6tFOJlxg-R2ICrUGGw
    short-id: 6ba85179e30d4fc2
  client-fingerprint: chrome
  smux:
    enabled: true
    protocol: h2mux
    max-connections: 4
    min-streams: 4
    max-streams: 16
  opts:
    keep-alive-interval: 15
    keep-alive-idle-timeout: 30
# ==================================================
# 策略组（已按要求优化）
# ==================================================
proxy-groups:
- name: 🚀 节点选择
  type: select
  proxies:
    - Seoul
    - DIRECT
- name: 🤖 AI 专用
  type: select
  proxies:
    - Seoul
- name: 🎮 Street Fighter 6
  type: select
  proxies:
    - Seoul
    - DIRECT
- name: 🎬 视频媒体
  type: select
  proxies:
    - Seoul
    - DIRECT
- name: 🌍 国外网站
  type: select
  proxies:
    - Seoul
    - DIRECT
- name: 📥 下载服务
  type: select
  proxies:
    - DIRECT
    - Seoul
