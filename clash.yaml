# ==========================================================
# 策略组
# ==========================================================
proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies: [⚡️ 全速优选, Seoul, Singapore, LA, DIRECT]

  - name: 🎬 流媒体
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 120    # 2分钟测速一次，应对晚高峰拥塞
    tolerance: 50
    proxies: [Seoul, Singapore, LA]

  - name: 📲 社交工具
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 600
    proxies: [Seoul, Singapore, LA]

  - name: 🛒 谷歌服务
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies: [Singapore, Seoul, LA]

  - name: 🤖 人工智能
    type: select
    proxies: [LA, Singapore, Seoul]

  - name: 🚫 广告拦截
    type: select
    proxies: [REJECT, DIRECT]

  - name: ⚡️ 全速优选
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies: [Seoul, Singapore, LA]

# ==========================================================
# 路由规则
# ==========================================================
rules:
  # 基础拦截与本地直连
  - DOMAIN-KEYWORD,adserver,🚫 广告拦截
