# ==================================================
# 基础
# ==================================================
mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090

# ==================================================
# TUN
# ==================================================
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true

# ==================================================
# DNS（生产级 FakeIP）
# ==================================================
dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - 1.1.1.1
    - 8.8.8.8
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.googlevideo.com'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'

